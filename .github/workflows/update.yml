name: Build SingBox Configs

on:
  schedule:
    - cron: "*/10 * * * *"
      timezone: "Europe/Moscow"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build configs
        run: |

          # НУЖНЫЕ ИСХОДНИКИ (4 источника)
          SOURCES=(
            "https://raw.githack.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
            "https://raw.githack.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-all.txt"
            "https://raw.githack.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-checked.txt"
            "https://raw.githack.com/igareck/vpn-configs-for-russia/main/WHITE-SNI-RU-all.txt"
          )
          
          # Собираем ВСЕ ключи из всех источников
          ALL_KEYS=""
          for SOURCE in "${SOURCES[@]}"; do
            echo "Fetching from: $SOURCE"
            KEYS=$(curl -s "$SOURCE" | tr -d '\r' | grep -E '^(vless|vmess|trojan)://' | grep -Evi 'raw' || true)
            ALL_KEYS="${ALL_KEYS}${KEYS}"$'\n'
          done
          
          # Убираем дубликаты и пустые строки
          ALL=$(echo "$ALL_KEYS" | grep -v '^$' | sort -u)
          
          # Разделяем на RU и NON-RU
          RUSSIA=$(echo "$ALL" | grep -Ei 'russia' | shuf || true)
          NON_RUSSIA=$(echo "$ALL" | grep -Evi 'russia' | shuf || true)
          
          # Функция создания конфига ровно из 5 ключей
          # Приоритет: сначала RU, потом при нехватке NON-RU
          make_config_5keys() {
            OUT=$1
            VARIANT=$2
            
            # Берем случайные русские ключи
            RU_KEYS=$(echo "$RUSSIA" | shuf | head -n 5 || true)
            RU_COUNT=$(echo "$RU_KEYS" | grep -c . || echo 0)
            
            # Если русских меньше 5, добираем из нерусских
            if [ "$RU_COUNT" -lt 5 ]; then
              NEED=$((5 - RU_COUNT))
              NONRU_KEYS=$(echo "$NON_RUSSIA" | shuf | head -n "$NEED" || true)
              FINAL=$(printf "%s\n%s\n" "$RU_KEYS" "$NONRU_KEYS" | grep .)
            else
              FINAL="$RU_KEYS"
            fi
            
            # Перемешиваем финальный список для разнообразия
            FINAL=$(echo "$FINAL" | shuf)
            
            FINAL_COUNT=$(echo "$FINAL" | grep -c . || echo 0)
            RU_IN_FINAL=$(echo "$FINAL" | grep -Ei 'russia' | grep -c . || echo 0)
            NONRU_IN_FINAL=$((FINAL_COUNT - RU_IN_FINAL))
            
            echo "Building $OUT (variant: $VARIANT)"
            echo "  - Total nodes: $FINAL_COUNT"
            echo "  - Russian nodes: $RU_IN_FINAL"
            echo "  - Non-Russian nodes: $NONRU_IN_FINAL"
            
            jq -n --arg input "$FINAL" '{
              core: "singbox",
              input: $input,
              options: {
                addTun: true,
                addSocks: true,
                genClashSecret: false,
                useExtended: false
              }
            }' \
            | curl -sS -X POST "https://api.web2core.workers.dev/" \
                -H "Content-Type: application/json" \
                --data-binary @- \
            > "$OUT"
          }
          
          # Получаем количество ссылок (источников) для создания конфигов
          # Каждая ссылка = свой конфиг + b-конфиг
          SOURCES_COUNT=${#SOURCES[@]}
          echo "Found $SOURCES_COUNT sources"
          
          # Создаем конфиги: по 2 конфига на каждый источник (основной и b)
          for i in "${!SOURCES[@]}"; do
            SOURCE_NUM=$((i + 1))
            
            # Для каждого источника обновляем списки RU и NON-RU из оригинального ALL
            # (чтобы каждый конфиг был независимым)
            RUSSIA=$(echo "$ALL" | grep -Ei 'russia' | shuf || true)
            NON_RUSSIA=$(echo "$ALL" | grep -Evi 'russia' | shuf || true)
            make_config_5keys "config_${SOURCE_NUM}.json" "source${SOURCE_NUM}_main"
            
            RUSSIA=$(echo "$ALL" | grep -Ei 'russia' | shuf || true)
            NON_RUSSIA=$(echo "$ALL" | grep -Evi 'russia' | shuf || true)
            make_config_5keys "config_${SOURCE_NUM}_b.json" "source${SOURCE_NUM}_backup"
          done
          
          # ---------------- PATCH URLTEST НА 1 МИНУТУ ДЛЯ ВСЕХ КОНФИГОВ ----------------
          patch_interval() {
            FILE=$1
            INTERVAL=$2
            
            echo "Patching $FILE -> interval=$INTERVAL"
            
            jq --arg interval "$INTERVAL" '
              (.outbounds[] | select(.type=="urltest") | .interval) = $interval |
              (.outbounds[] | select(.type=="urltest") | .tolerance) = 50
            ' "$FILE" > tmp.json && mv tmp.json "$FILE"
          }
          
          # Применяем патч 1 минута для ВСЕХ конфигов
          for file in config_*.json; do
            if [ -f "$file" ]; then
              patch_interval "$file" "1m"
            fi
          done
          
          # Выводим список созданных файлов
          echo "Created configs:"
          ls -la config_*.json

      - name: Commit configs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          git add config_*.json
          
          git commit -m "auto update sing-box configs (5 keys each, RU priority)" || exit 0
          
          git push
          
      - name: Upload to Yandex Disk via WebDAV
        env:
          YA_LOGIN: ${{ secrets.YANDEX_NAME }}
          YA_PASS: ${{ secrets.YANDEX_TOKEN }}
        run: |
          # Кодируем логин:пароль в base64
          AUTH_HEADER=$(echo -n "$YA_LOGIN:$YA_PASS" | base64)
          
          # Создаём папку
          curl -s -X MKCOL "https://webdav.yandex.ru/SingBox_Configs/" \
               -H "Authorization: Basic $AUTH_HEADER"
          
          # Загружаем все файлы config_*.json
          for file in config_*.json; do
            echo "Uploading $file..."
            curl -s -T "$file" "https://webdav.yandex.ru/SingBox_Configs/$file" \
                 -H "Authorization: Basic $AUTH_HEADER"
          done
